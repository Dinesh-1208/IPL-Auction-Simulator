kind = "web"
previewPath = "/"
title = "IPL Auction Simulator"
version = "1.0.0"
id = "artifacts/ipl-auction"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20393

[services.development]
run = "pnpm --filter @workspace/ipl-auction run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ipl-auction", "run", "build" ]
publicDir = "artifacts/ipl-auction/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20393"
BASE_PATH = "/"

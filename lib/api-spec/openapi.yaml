openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: IPL Auction Simulator API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: seasons
    description: IPL seasons and player data
  - name: rooms
    description: Auction room management
  - name: teams
    description: Team and franchise management
  - name: players
    description: Player pool and management
  - name: auction
    description: Live auction operations
  - name: chat
    description: In-room messaging
  - name: ai
    description: AI squad analysis

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Seasons
  /seasons:
    get:
      operationId: listSeasons
      tags: [seasons]
      summary: List all IPL seasons
      responses:
        "200":
          description: List of seasons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Season"

  /seasons/{year}/teams:
    get:
      operationId: getSeasonTeams
      tags: [seasons]
      summary: Get teams for a season
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Teams for the season
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Franchise"

  /seasons/{year}/players:
    get:
      operationId: listSeasonPlayers
      tags: [seasons]
      summary: Get all players for a season
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: teamId
          in: query
          schema:
            type: ["integer", "null"]
        - name: role
          in: query
          schema:
            type: ["string", "null"]
        - name: nationality
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Players for the season
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"

  # Rooms
  /rooms:
    post:
      operationId: createRoom
      tags: [rooms]
      summary: Create an auction room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInput"
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /rooms/{code}:
    get:
      operationId: getRoom
      tags: [rooms]
      summary: Get room by code
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Room details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "404":
          description: Room not found

  /rooms/{code}/join:
    post:
      operationId: joinRoom
      tags: [rooms]
      summary: Join a room
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinRoomInput"
      responses:
        "200":
          description: Joined room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomMember"

  /rooms/{code}/members:
    get:
      operationId: getRoomMembers
      tags: [rooms]
      summary: Get room members
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Room members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoomMember"

  /rooms/{code}/start:
    post:
      operationId: startAuction
      tags: [rooms]
      summary: Start the auction
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Auction started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /rooms/{code}/summary:
    get:
      operationId: getRoomSummary
      tags: [rooms]
      summary: Get room summary with budget overview
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Room summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomSummary"

  /rooms/my:
    get:
      operationId: getMyRooms
      tags: [rooms]
      summary: Get current user's rooms
      responses:
        "200":
          description: User's rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"

  # Teams
  /rooms/{code}/teams:
    get:
      operationId: getRoomTeams
      tags: [teams]
      summary: Get all teams in the room
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Teams in room
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"

  /rooms/{code}/teams/{franchiseId}/select:
    post:
      operationId: selectFranchise
      tags: [teams]
      summary: Select a franchise for the room
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
        - name: franchiseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Franchise selected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /rooms/{code}/teams/{teamId}/retain:
    post:
      operationId: retainPlayers
      tags: [teams]
      summary: Submit player retentions for team
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetentionInput"
      responses:
        "200":
          description: Players retained
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /rooms/{code}/teams/{teamId}/squad:
    get:
      operationId: getTeamSquad
      tags: [teams]
      summary: Get full team squad with stats
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
        - name: teamId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team squad
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamSquad"

  # Auction Pool
  /rooms/{code}/pool:
    get:
      operationId: listAuctionPool
      tags: [players]
      summary: Get auction pool
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: ["string", "null"]
        - name: nationality
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Auction pool
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuctionPoolPlayer"

  # Live Auction
  /rooms/{code}/auction/current:
    get:
      operationId: getCurrentAuctionPlayer
      tags: [auction]
      summary: Get current player being auctioned
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /rooms/{code}/auction/bid:
    post:
      operationId: placeBid
      tags: [auction]
      summary: Place a bid on current player
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BidInput"
      responses:
        "200":
          description: Bid placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"
        "400":
          description: Invalid bid

  /rooms/{code}/auction/sold:
    post:
      operationId: markPlayerSold
      tags: [auction]
      summary: Mark current player as sold (host only)
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Player sold
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /rooms/{code}/auction/rtm:
    post:
      operationId: makeRtmDecision
      tags: [auction]
      summary: Make Right-To-Match decision (former franchise owner only)
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                useRtm:
                  type: boolean
              required: [useRtm]
      responses:
        "200":
          description: RTM decision processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /rooms/{code}/auction/unsold:
    post:
      operationId: markPlayerUnsold
      tags: [auction]
      summary: Mark current player as unsold (host only)
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Player unsold
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /rooms/{code}/auction/next:
    post:
      operationId: nextPlayer
      tags: [auction]
      summary: Move to next player (host only)
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Next player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionState"

  /rooms/{code}/auction/history:
    get:
      operationId: getAuctionHistory
      tags: [auction]
      summary: Get bid history for current player
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bid history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bid"

  /rooms/{code}/auction/complete:
    post:
      operationId: completeAuction
      tags: [auction]
      summary: Complete the auction
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Auction completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  # Chat
  /rooms/{code}/messages:
    get:
      operationId: listRoomMessages
      tags: [chat]
      summary: Get room chat messages
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
        - name: teamId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a chat message
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  # AI Analysis
  /rooms/{code}/ai-report:
    get:
      operationId: getAiReport
      tags: [ai]
      summary: Get AI squad analysis report
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: AI report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiReport"

    post:
      operationId: generateAiReport
      tags: [ai]
      summary: Generate AI squad analysis
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: AI analysis generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiReport"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Season:
      type: object
      properties:
        year:
          type: integer
        name:
          type: string
        totalTeams:
          type: integer
        totalPlayers:
          type: integer
      required: [year, name, totalTeams, totalPlayers]

    Franchise:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        shortName:
          type: string
        city:
          type: string
        primaryColor:
          type: string
        secondaryColor:
          type: string
        logoUrl:
          type: ["string", "null"]
      required: [id, name, shortName, city, primaryColor, secondaryColor]

    Player:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
        nationality:
          type: string
        isOverseas:
          type: boolean
        age:
          type: ["integer", "null"]
        basePricecrore:
          type: number
        soldPricecrore:
          type: ["number", "null"]
        isCapped:
          type: boolean
        franchiseId:
          type: ["integer", "null"]
        franchiseName:
          type: ["string", "null"]
        battingStyle:
          type: ["string", "null"]
        bowlingStyle:
          type: ["string", "null"]
      required: [id, name, role, nationality, isOverseas, basePricecrore, isCapped]

    RoomInput:
      type: object
      properties:
        name:
          type: string
        seasonYear:
          type: integer
        auctionType:
          type: string
          enum: [mega, mini]
        budgetCrore:
          type: number
        maxSquadSize:
          type: integer
        maxOverseas:
          type: integer
        maxOwnersPerTeam:
          type: integer
        auctionSpeed:
          type: string
          enum: [fast, normal, slow]
        rtmEnabled:
          type: boolean
          default: true
        maxRetentions:
          type: integer
          default: 6
      required: [name, seasonYear, auctionType, budgetCrore, maxSquadSize, maxOverseas, maxOwnersPerTeam, auctionSpeed]

    Room:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        hostUserId:
          type: string
        seasonYear:
          type: integer
        auctionType:
          type: string
        status:
          type: string
          enum: [lobby, preparation, auction, completed]
        budgetCrore:
          type: number
        maxSquadSize:
          type: integer
        maxOverseas:
          type: integer
        maxOwnersPerTeam:
          type: integer
        auctionSpeed:
          type: string
        currentPlayerIndex:
          type: integer
        rtmEnabled:
          type: boolean
        maxRetentions:
          type: integer
        rtmPendingTeamId:
          type: ["integer", "null"]
        rtmBidAmountCrore:
          type: ["number", "null"]
        rtmBidderTeamId:
          type: ["integer", "null"]
        createdAt:
          type: string
      required: [id, code, name, hostUserId, seasonYear, auctionType, status, budgetCrore, maxSquadSize, maxOverseas, maxOwnersPerTeam, auctionSpeed, currentPlayerIndex, createdAt]

    JoinRoomInput:
      type: object
      properties:
        userId:
          type: string
        displayName:
          type: string
      required: [userId, displayName]

    RoomMember:
      type: object
      properties:
        id:
          type: integer
        roomId:
          type: integer
        userId:
          type: string
        displayName:
          type: string
        teamId:
          type: ["integer", "null"]
        teamName:
          type: ["string", "null"]
        isOnline:
          type: boolean
        joinedAt:
          type: string
      required: [id, roomId, userId, displayName, isOnline, joinedAt]

    RoomSummary:
      type: object
      properties:
        room:
          $ref: "#/components/schemas/Room"
        teamCount:
          type: integer
        memberCount:
          type: integer
        playersAuctioned:
          type: integer
        playersRemaining:
          type: integer
        totalMoneySpent:
          type: number
        teams:
          type: array
          items:
            $ref: "#/components/schemas/TeamBudgetSummary"
      required: [room, teamCount, memberCount, playersAuctioned, playersRemaining, totalMoneySpent, teams]

    TeamBudgetSummary:
      type: object
      properties:
        teamId:
          type: integer
        franchiseName:
          type: string
        shortName:
          type: string
        primaryColor:
          type: string
        budgetRemaining:
          type: number
        budgetSpent:
          type: number
        squadSize:
          type: integer
        overseasCount:
          type: integer
      required: [teamId, franchiseName, shortName, primaryColor, budgetRemaining, budgetSpent, squadSize, overseasCount]

    Team:
      type: object
      properties:
        id:
          type: integer
        roomId:
          type: integer
        franchiseId:
          type: integer
        franchiseName:
          type: string
        shortName:
          type: string
        primaryColor:
          type: string
        secondaryColor:
          type: string
        budgetRemainingCrore:
          type: number
        budgetSpentCrore:
          type: number
        retentionComplete:
          type: boolean
        owners:
          type: array
          items:
            $ref: "#/components/schemas/TeamOwner"
      required: [id, roomId, franchiseId, franchiseName, shortName, primaryColor, secondaryColor, budgetRemainingCrore, budgetSpentCrore, retentionComplete, owners]

    TeamOwner:
      type: object
      properties:
        userId:
          type: string
        displayName:
          type: string
        isOnline:
          type: boolean
      required: [userId, displayName, isOnline]

    RetentionInput:
      type: object
      properties:
        playerIds:
          type: array
          items:
            type: integer
        retentionPricesCrore:
          type: array
          items:
            type: number
      required: [playerIds, retentionPricesCrore]

    TeamSquad:
      type: object
      properties:
        team:
          $ref: "#/components/schemas/Team"
        retainedPlayers:
          type: array
          items:
            $ref: "#/components/schemas/SquadPlayer"
        auctionedPlayers:
          type: array
          items:
            $ref: "#/components/schemas/SquadPlayer"
        batters:
          type: integer
        bowlers:
          type: integer
        allRounders:
          type: integer
        wicketKeepers:
          type: integer
        overseas:
          type: integer
        indian:
          type: integer
        averageAge:
          type: ["number", "null"]
      required: [team, retainedPlayers, auctionedPlayers, batters, bowlers, allRounders, wicketKeepers, overseas, indian]

    SquadPlayer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
        nationality:
          type: string
        isOverseas:
          type: boolean
        priceCrore:
          type: number
        isRetained:
          type: boolean
        battingStyle:
          type: ["string", "null"]
        bowlingStyle:
          type: ["string", "null"]
      required: [id, name, role, nationality, isOverseas, priceCrore, isRetained]

    AuctionPoolPlayer:
      type: object
      properties:
        id:
          type: integer
        playerId:
          type: integer
        name:
          type: string
        role:
          type: string
        nationality:
          type: string
        isOverseas:
          type: boolean
        basePriceCrore:
          type: number
        status:
          type: string
          enum: [available, sold, unsold, retained]
        soldToCrore:
          type: ["number", "null"]
        soldToTeamId:
          type: ["integer", "null"]
        soldToTeamName:
          type: ["string", "null"]
        previousTeamName:
          type: ["string", "null"]
      required: [id, playerId, name, role, nationality, isOverseas, basePriceCrore, status]

    AuctionState:
      type: object
      properties:
        currentPlayer:
          $ref: "#/components/schemas/AuctionPoolPlayer"
        currentBidCrore:
          type: number
        currentBidderTeamId:
          type: ["integer", "null"]
        currentBidderTeamName:
          type: ["string", "null"]
        timerSeconds:
          type: integer
        status:
          type: string
          enum: [idle, bidding, rtm, sold, unsold, completed]
        rtmPendingTeamId:
          type: ["integer", "null"]
        rtmPendingTeamName:
          type: ["string", "null"]
        totalPlayersAuctioned:
          type: integer
        totalPlayersRemaining:
          type: integer
      required: [currentBidCrore, timerSeconds, status, totalPlayersAuctioned, totalPlayersRemaining]

    BidInput:
      type: object
      properties:
        teamId:
          type: integer
        bidAmountCrore:
          type: number
      required: [teamId, bidAmountCrore]

    Bid:
      type: object
      properties:
        id:
          type: integer
        teamId:
          type: integer
        teamName:
          type: string
        bidAmountCrore:
          type: number
        placedAt:
          type: string
      required: [id, teamId, teamName, bidAmountCrore, placedAt]

    Message:
      type: object
      properties:
        id:
          type: integer
        roomId:
          type: integer
        teamId:
          type: ["integer", "null"]
        userId:
          type: string
        displayName:
          type: string
        content:
          type: string
        isSystem:
          type: boolean
        createdAt:
          type: string
      required: [id, roomId, userId, displayName, content, isSystem, createdAt]

    MessageInput:
      type: object
      properties:
        userId:
          type: string
        displayName:
          type: string
        content:
          type: string
        teamId:
          type: ["integer", "null"]
      required: [userId, displayName, content]

    AiReport:
      type: object
      properties:
        id:
          type: integer
        roomId:
          type: integer
        status:
          type: string
          enum: [pending, generating, completed, failed]
        generatedAt:
          type: ["string", "null"]
        rankings:
          type: array
          items:
            $ref: "#/components/schemas/TeamRanking"
        predictedChampion:
          type: ["string", "null"]
        overallAnalysis:
          type: ["string", "null"]
      required: [id, roomId, status, rankings]

    TeamRanking:
      type: object
      properties:
        rank:
          type: integer
        teamId:
          type: integer
        franchiseName:
          type: string
        shortName:
          type: string
        primaryColor:
          type: string
        overallScore:
          type: number
        topOrderScore:
          type: number
        middleOrderScore:
          type: number
        finishersScore:
          type: number
        spinAttackScore:
          type: number
        paceAttackScore:
          type: number
        deathBowlingScore:
          type: number
        powerpayBowlingScore:
          type: number
        benchStrengthScore:
          type: number
        captaincyScore:
          type: number
        balanceScore:
          type: number
        squadDepthScore:
          type: number
        strengths:
          type: array
          items:
            type: string
        weaknesses:
          type: array
          items:
            type: string
        reasoning:
          type: string
